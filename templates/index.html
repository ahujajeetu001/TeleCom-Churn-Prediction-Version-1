<!DOCTYPE html>
<html>
<head>
    <title>Churn Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Customer Churn Prediction</h1>

    <form action="/predict" method="post">

        <input type="number" name="tenure" placeholder="Tenure (months)" required>

        <input type="number" step="0.01" name="monthly" placeholder="Monthly Charges" required>

        <input type="number" step="0.01" name="total" placeholder="Total Charges" required>

        <select name="gender">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <select name="contract">
            <option value="">Contract Type</option>
            <option>Month-to-month</option>
            <option>One year</option>
            <option>Two year</option>
        </select>

        <select name="internet">
            <option value="">Internet Service</option>
            <option>DSL</option>
            <option>Fiber optic</option>
            <option>No</option>
        </select>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="result">
            <h2>{{ prediction }}</h2>
        </div>
    {% endif %}
</div>

</body>
</html>
